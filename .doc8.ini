[doc8]
# RST linting configuration
# See: https://doc8.readthedocs.io/en/latest/

# Paths to check
paths = docs/source

# File extensions to check
extensions = .rst

# Ignore specific rules:
# D001: Line too long (handled separately)
# D002: Trailing whitespace (handled by pre-commit)
# D004: Found literal carriage return
ignore = D001

# Maximum line length (0 = disabled)
max-line-length = 0

# Ignore specific paths
ignore-path =
    docs/build,
    docs/source/_static,
    docs/source/_templates
