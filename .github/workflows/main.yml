name: Documentation CI

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint RST Files
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install doc8 rstcheck[sphinx]

      - name: Run doc8 linter
        run: |
          doc8 docs/source --ignore D001 --quiet || true

      - name: Run rstcheck
        run: |
          rstcheck --recursive docs/source --ignore-directives automodule,toctree || true
