name: Documentation CI

on:
  push:
    branches: [main, devel]
  pull_request:
    branches: [main, devel]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements.txt

      - name: Build HTML documentation
        run: |
          sphinx-build -b html --keep-going docs/source docs/build/html
        env:
          SPHINXOPTS: "-j auto"

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/build/html
          retention-days: 7

  linkcheck:
    name: Check Links
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/requirements.txt

      - name: Check external links
        run: |
          sphinx-build -b linkcheck docs/source docs/build/linkcheck || true

      - name: Upload linkcheck results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linkcheck-results
          path: docs/build/linkcheck/output.txt
          retention-days: 7

  lint:
    name: Lint RST Files
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install doc8 rstcheck[sphinx]

      - name: Run doc8 linter
        run: |
          doc8 docs/source --ignore D001 --quiet || true

      - name: Run rstcheck
        run: |
          rstcheck --recursive docs/source --ignore-directives automodule,toctree || true
