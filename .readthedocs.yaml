version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.11"
  jobs:
    # Validate RST files before building
    pre_build:
      - echo "Running RST validation..."
      - python -m pip install doc8 rstcheck[sphinx]
      - doc8 docs/source --ignore D001 --quiet || echo "doc8 warnings found (non-blocking)"
    # Run link check after successful build
    post_build:
      - echo "Running link check..."
      - python -m sphinx -b linkcheck -q docs/source $READTHEDOCS_OUTPUT/linkcheck || echo "Link check completed with warnings"

python:
  install:
    - requirements: requirements/requirements.txt

sphinx:
  configuration: docs/source/conf.py
  builder: html
  fail_on_warning: false

formats:
  - pdf
  - epub
